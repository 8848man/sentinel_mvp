name: sentinel
description: Sentinel — AI Error Resolution Copilot
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.6.2

  # Auth + backend
  supabase_flutter: ^2.8.3
  dio: ^5.7.0

  # Utilities
  intl: ^0.19.0
  google_fonts: ^6.2.1

  # OCR-assisted Raw Log extraction (sdd/context/04_1_ocr_log_extraction.md)
  # Web-compatible: wraps a browser file input, no native-app dependency.
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

